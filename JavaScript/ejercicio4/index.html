<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>OPERADORES</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="contenedor">
    <h2>OPERADORES</h2>

    <div class="fila">
        <label>Número 1:</label>
        <input type="number" id="numero1" value="5">

        <label>Número 2:</label>
        <input type="number" id="numero2" value="6">

        <button id="sumar">Sumar</button>
        <button id="restar">Restar</button>
        <button id="multiplicar">Producto</button>
        <button id="dividir">División</button>
        <button id="limpiar">Limpiar</button>
    </div>

    <div class="contenedor-resultado">
        <span class="label-resultado">Resultado:</span>

        <div class="caja-resultado">
            <div id="barraResultado" class="barra-resultado">
                <span id="textoResultado">11</span>
            </div>
        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
