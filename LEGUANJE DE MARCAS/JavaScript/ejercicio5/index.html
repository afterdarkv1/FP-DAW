<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Menú Seleccionable</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h2 class="titulo">MENU SELECCIONABLE</h2>

<ul id="menu">
<li class="active">¿EL NÚMERO ES PAR?</li>
<li>¿EL NÚMERO ES IMPAR?</li>
<li>¿EL NÚMERO ES PRIMO?</li>
<li>OBTENER DIVISORES</li>

<div class="controls">

<button id="down">⬇</button>

<input type="number" id="numero" placeholder="1 - 100">

<button id="calcular">CALCULAR</button>
</div>

<input type="text" id="resultado" readonly>

</div>

<script src="script.js"></script>
</body>
</html>
